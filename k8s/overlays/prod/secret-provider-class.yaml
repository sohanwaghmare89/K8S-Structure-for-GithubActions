apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: my-secrets
  namespace: my-namespace
spec:
  provider: azure
  
  parameters:
    usePodIdentity: "false"
    useVMManagedIdentity: "true"
    userAssignedIdentityID: "e5ed1533-65c0-******************"
    keyvaultName: "My-app-BE-FE-prod"
    cloudName: "AzurePublicCloud"
    tenantId: "e2779e10-*******************"

    objects: |
      array:
        - |
          objectName: mysqlEngine
          objectType: secret
        - |
          objectName: mysqlPassword
          objectType: secret
        - |
          objectName: mysqlUsername
          objectType: secret
        - |
          objectName: mysqlPort
          objectType: secret
        - |
          objectName: mysqlHost
          objectType: secret
