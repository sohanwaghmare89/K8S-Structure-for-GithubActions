apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
- ../../base
- secret-provider-class.yaml

patches:
- path: service-account.yaml
- path: deployment.yaml
- path: ingress.yaml

# Image overrides - this is where kustomize edit set image will update
images:
- name: My-app-BE-FE
  newName: myecrname.azurecr.io/My-app-BE-FE-stg